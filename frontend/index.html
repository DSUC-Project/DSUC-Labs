<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DSUC Lab | DUT Superteam University Club Web3 Hub</title>
  <link rel="icon" type="image/png" href="/logo.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'main-bg': 'var(--bg-main)',
            surface: 'var(--bg-surface)',
            'surface-elevated': 'var(--bg-surface-elevated)',
            'text-main': 'var(--text-main)',
            'text-muted': 'var(--text-muted)',
            'border-main': 'var(--border-main)',
            primary: 'var(--color-primary)',
            accent: 'var(--color-accent)',
            success: 'var(--color-success)',
            error: 'var(--color-error)',
            brutal: {
              bg: 'var(--brutal-bg)',
              black: 'var(--brutal-black)',
              yellow: 'var(--brutal-yellow)',
              blue: 'var(--brutal-blue)',
              pink: 'var(--brutal-pink)',
              green: 'var(--brutal-green)',
              red: 'var(--brutal-red)'
            }
          },
          fontFamily: {
            sans: ['Manrope', 'sans-serif'],
            display: ['Space Grotesk', 'sans-serif'],
            heading: ['Space Grotesk', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          boxShadow: {
            'neo': 'var(--shadow-card)',
            'neo-sm': 'var(--shadow-card-sm)',
            'neo-lg': 'var(--shadow-card-lg)',
            'neo-xl': 'var(--shadow-card-xl)',
            'brutal': 'var(--shadow-card)',
            'brutal-sm': 'var(--shadow-card-sm)',
            'brutal-hover': 'var(--shadow-card-lg)',
            'brutal-active': 'var(--shadow-press)',
          },
          animation: {
            'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          },
        },
      },
    }
  </script>
  <style>
    body {
      background-color: var(--bg-main, #f6f1e7);
      color: var(--text-main, #142033);
      overflow-x: hidden;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 10px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-main, #f6f1e7);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border-main, #8f9cb2);
      border-radius: 0px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--color-primary, #2f66f6);
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
